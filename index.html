<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Dashboard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --gold: #d4af37; --white: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--white); margin: 0; padding-bottom: 30px; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #333; text-align: center; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
        .container { width: 94%; max-width: 500px; margin: 15px auto; }

        /* セレクター */
        .select-label { font-size: 0.75rem; color: var(--gold); margin: 10px 0 5px 5px; font-weight: bold; }
        .select-box { background: var(--card); border: 1px solid var(--gold); padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .dropdown { display: none; background: var(--card); border: 1px solid #444; border-radius: 10px; padding: 5px; margin-top: 5px; max-height: 400px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* 店舗セクション */
        .store-group { border-bottom: 1px solid #333; margin-bottom: 5px; }
        .store-header { background: rgba(212, 175, 55, 0.1); padding: 10px; display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--gold); }
        .staff-option { padding: 10px 10px 10px 35px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
        
        input[type="checkbox"] { transform: scale(1.3); accent-color: var(--gold); }
        label { cursor: pointer; flex-grow: 1; }

        .chart-card { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid rgba(212, 175, 55, 0.2); height: 400px; margin-top: 15px; }
        #loading { text-align: center; margin-top: 80px; color: var(--gold); }
    </style>
</head>
<body>

<header>STAFF PERFORMANCE</header>

<div id="loading"><i class="fas fa-circle-notch fa-spin fa-2x"></i><p>Loading Team Data...</p></div>

<div class="container" id="main-content" style="display: none;">
    <div class="select-label">SELECT TEAM / STAFF</div>
    <div class="select-box" onclick="toggleDropdown()">
        <span id="filter-label">読み込み中...</span><i class="fas fa-users"></i>
    </div>
    <div id="filter-dropdown" class="dropdown"></div>

    <div class="chart-card">
        <canvas id="salesChart"></canvas>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/a/macros/senryoyakusha.com/s/AKfycbxAzSojBu5Tjzjge2akg4d_VKGdl6ZCYoEjaRRKiZaRI5DXfFEdkH8MKwW2eI2UgCc/exec";
    const currentUserId = "user_gps3atgzq"; 

    const COLORS = ['#d4af37','#3498db','#e74c3c','#2ecc71','#9b59b6','#f1c40f','#1abc9c','#e67e22','#ecf0f1','#ff69b4'];

    let allData = null;
    let myChart = null;
    let selectedKeys = []; 

    async function init() {
        try {
            const res = await fetch(`${GAS_URL}?userId=${currentUserId}`);
            allData = await res.json();
            
            if (allData.status === 'success') {
                // 1. 自分の所属店舗を特定して、そのスタッフ全員を初期選択
                const myName = allData.myInfo.userName;
                const myStore = allData.staffList.find(s => s.name === myName)?.store;
                
                if (myStore) {
                    // 自店舗のスタッフ全員を初期選択
                    selectedKeys = allData.staffList.filter(s => s.store === myStore).map(s => s.name);
                } else {
                    selectedKeys = [myName]; // 所属不明なら自分だけ
                }

                renderDropdown(myStore);
                updateChart();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        } catch (e) { console.error(e); }
    }

    function toggleDropdown() {
        const el = document.getElementById('filter-dropdown');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function renderDropdown(myStore) {
        const container = document.getElementById('filter-dropdown');
        
        // 店舗リストを「自分の店舗」が先頭に来るようにソート
        const sortedStores = [...allData.storeList].sort((a, b) => (a === myStore ? -1 : b === myStore ? 1 : 0));

        let html = "";
        sortedStores.forEach(storeName => {
            const staffsInStore = allData.staffList.filter(s => s.store === storeName);
            
            html += `<div class="store-group">
                <div class="store-header">
                    <input type="checkbox" id="store-${storeName}" onchange="toggleStoreGroup('${storeName}', this)">
                    <label for="store-${storeName}">${storeName} (全員選択)</label>
                </div>`;
            
            staffsInStore.forEach(s => {
                html += `
                <div class="staff-option">
                    <input type="checkbox" class="staff-chk" data-store="${storeName}" value="${s.name}" 
                        ${selectedKeys.includes(s.name) ? 'checked' : ''} onchange="handleStaffChange()">
                    <label>${s.name}</label>
                </div>`;
            });
            html += `</div>`;
        });

        container.innerHTML = html;
        updateLabel();
    }

    // 店舗チェックボックスを触った時：その店舗のスタッフを全員ON/OFF
    function toggleStoreGroup(storeName, storeEl) {
        const staffChecks = document.querySelectorAll(`.staff-chk[data-store="${storeName}"]`);
        staffChecks.forEach(chk => {
            chk.checked = storeEl.checked;
        });
        handleStaffChange();
    }

    function handleStaffChange() {
        const chks = document.querySelectorAll('.staff-chk:checked');
        selectedKeys = Array.from(chks).map(c => c.value);
        updateLabel();
        updateChart();
    }

    function updateLabel() {
        const label = document.getElementById('filter-label');
        label.innerText = selectedKeys.length > 0 ? `${selectedKeys.length}名の推移を表示中` : "表示対象を選択";
    }

    function updateChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (myChart) myChart.destroy();

        const datasets = selectedKeys.map((name, i) => ({
            label: name,
            data: allData.chartData[name],
            borderColor: COLORS[i % COLORS.length],
            borderWidth: 2,
            pointRadius: 4,
            pointHitRadius: 30,
            tension: 0.3,
            fill: false
        }));

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { position: 'bottom', labels: { color: '#fff', boxWidth: 10, font: { size: 10 } } } }
            }
        });
    }

    init();
</script>
</body>
</html>
