<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Management Dashboard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --gold: #d4af37; --white: #ffffff; --gray: #2a2a2a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--white); margin: 0; padding-bottom: 50px; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #333; text-align: center; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
        .container { width: 94%; max-width: 500px; margin: 10px auto; }
        
        .metric-selector { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; scrollbar-width: none; }
        .metric-btn { white-space: nowrap; padding: 10px 18px; border-radius: 10px; background: var(--gray); border: 1px solid #444; color: #aaa; font-size: 0.8rem; cursor: pointer; }
        .metric-btn.active { background: var(--gold); color: #000; font-weight: bold; }

        .select-box { background: var(--card); border: 1px solid #444; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.85rem; margin-bottom: 10px; }
        .dropdown { display: none; background: var(--card); border: 1px solid #444; border-radius: 10px; padding: 5px; max-height: 350px; overflow-y: auto; position: absolute; width: 90%; max-width: 470px; z-index: 1000; }
        
        .chart-card { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid rgba(212, 175, 55, 0.2); height: 320px; margin-top: 10px; }

        /* カードデザイン */
        .stats-container { margin-top: 25px; }
        .stats-title { font-size: 0.8rem; color: var(--gold); margin-bottom: 12px; font-weight: bold; letter-spacing: 1px; }
        .stat-card { 
            background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px;
            border-left: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .stat-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .stat-name { font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; display: block; }
        
        /* 予測・実績の並列表示用 */
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #333; pt: 10px; margin-top: 5px; padding-top: 10px;}
        .data-item { display: flex; flex-direction: column; }
        .data-label { font-size: 0.65rem; color: #aaa; margin-bottom: 2px; }
        .data-value { font-size: 1.1rem; color: var(--gold); font-weight: bold; }
        .data-value.sub { color: #eee; font-size: 1rem; }

        #loading { text-align: center; margin-top: 80px; color: var(--gold); }
    </style>
</head>
<body>

<header>DASHBOARD 2026</header>

<div id="loading"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>

<div class="container" id="main-content" style="display: none;">
    <div class="metric-selector">
        <button class="metric-btn active" onclick="changeMetric('sales', this)">総売上</button>
        <button class="metric-btn" onclick="changeMetric('shimeiSales', this)">指名売上</button>
        <button class="metric-btn" onclick="changeMetric('timePrice', this)">時間単価</button>
        <button class="metric-btn" onclick="changeMetric('shimeiCount', this)">指名客数</button>
        <button class="metric-btn" onclick="changeMetric('nextReserve', this)">次回予約率</button>
        <button class="metric-btn" onclick="changeMetric('newRepeat', this)">新規再来率</button>
    </div>

    <div class="select-box" onclick="toggleDropdown()">
        <span id="filter-label">スタッフを選択</span><i class="fas fa-users"></i>
    </div>
    <div id="filter-dropdown" class="dropdown"></div>

    <div class="chart-card"><canvas id="salesChart"></canvas></div>

    <div class="stats-container">
        <div class="stats-title" id="stats-title">実績データ</div>
        <div id="stat-cards-list"></div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/a/macros/senryoyakusha.com/s/AKfycbxAzSojBu5Tjzjge2akg4d_VKGdl6ZCYoEjaRRKiZaRI5DXfFEdkH8MKwW2eI2UgCc/exec";
    const currentUserId = "user_gps3atgzq"; 
    const COLORS = ['#d4af37','#3498db','#e74c3c','#2ecc71','#9b59b6','#f1c40f','#1abc9c','#e67e22','#ecf0f1','#ff69b4'];

    let allData = null, myChart = null, selectedKeys = [], currentMetric = 'sales';
    const formats = {
        sales: { u: '￥', s: '', d: 0 }, shimeiSales: { u: '￥', s: '', d: 0 }, timePrice: { u: '￥', s: '', d: 0 },
        shimeiCount: { u: '', s: '名', d: 0 }, nextReserve: { u: '', s: '％', d: 2 }, newRepeat: { u: '', s: '％', d: 2 },
        forecast: { u: '￥', s: '', d: 0 }
    };

    async function init() {
        try {
            const res = await fetch(`${GAS_URL}?userId=${currentUserId}`);
            allData = await res.json();
            if (allData.status === 'success') {
                const myName = allData.myInfo.userName;
                const myStore = allData.staffList.find(s => s.name === myName)?.store;
                selectedKeys = allData.staffList.filter(s => s.store === myStore).map(s => s.name);
                renderDropdown(myStore);
                updateDisplay();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        } catch (e) { console.error(e); }
    }

    function toggleDropdown() {
        const el = document.getElementById('filter-dropdown');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function renderDropdown(myStore) {
        const container = document.getElementById('filter-dropdown');
        const sortedStores = [...allData.storeList].sort((a, b) => (a === myStore ? -1 : b === myStore ? 1 : 0));
        let html = "";
        sortedStores.forEach(store => {
            html += `<div style="padding:10px; color:var(--gold); font-weight:bold; font-size:0.8rem; background:rgba(212,175,55,0.1)">${store}</div>`;
            allData.staffList.filter(s => s.store === store).forEach(s => {
                html += `<div style="padding:12px 10px 12px 30px; border-bottom:1px solid #333; display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" class="staff-chk" value="${s.name}" ${selectedKeys.includes(s.name) ? 'checked' : ''} onchange="handleStaffChange()">
                    <label style="font-size:0.85rem;">${s.name}</label>
                </div>`;
            });
        });
        container.innerHTML = html;
        updateLabel();
    }

    function handleStaffChange() {
        selectedKeys = Array.from(document.querySelectorAll('.staff-chk:checked')).map(c => c.value);
        updateLabel(); updateDisplay();
    }

    function updateLabel() { document.getElementById('filter-label').innerText = selectedKeys.length + "名を選択中"; }

    function changeMetric(metric, btn) {
        document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMetric = metric;
        updateDisplay();
    }

    function getFormatted(val, metric = currentMetric) {
        const f = formats[metric];
        return f.u + Number(val).toLocaleString(undefined, {minimumFractionDigits: f.d, maximumFractionDigits: f.d}) + (f.s || '');
    }

    function updateDisplay() {
        updateChart();
        updateCards();
    }

    function updateCards() {
        const listContainer = document.getElementById('stat-cards-list');
        const titleContainer = document.getElementById('stats-title');
        const currentYear = allData.yearList[0];
        const monthIdx = new Date().getMonth();
        const monthName = (monthIdx + 1) + '月';

        // タイトルの切り替え
        titleContainer.innerText = (currentMetric === 'sales') ? `${monthName} 売上予測 vs 実績` : `${monthName} 実績データ`;

        let html = "";
        selectedKeys.forEach((name, i) => {
            const val = allData.chartData[currentYear][name][currentMetric][monthIdx];
            const forecast = allData.chartData[currentYear][name]['forecast'][monthIdx];

            if (currentMetric === 'sales') {
                // 総売上の時のリッチレイアウト
                html += `
                    <div class="stat-card" style="border-left-color: ${COLORS[i % COLORS.length]}">
                        <span class="stat-name">${name}</span>
                        <div class="comparison-grid">
                            <div class="data-item">
                                <span class="data-label">売上予測</span>
                                <span class="data-value sub">${getFormatted(forecast, 'forecast')}</span>
                            </div>
                            <div class="data-item">
                                <span class="data-label">現在実績</span>
                                <span class="data-value">${getFormatted(val)}</span>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // 通常レイアウト
                html += `
                    <div class="stat-card" style="border-left-color: ${COLORS[i % COLORS.length]}">
                        <div class="stat-row">
                            <span class="stat-name">${name}</span>
                            <span class="data-value">${getFormatted(val)}</span>
                        </div>
                    </div>
                `;
            }
        });
        listContainer.innerHTML = html || '<p style="text-align:center;color:#666;">スタッフ未選択</p>';
    }

    function updateChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (myChart) myChart.destroy();
        const year = allData.yearList[0];
        const datasets = selectedKeys.map((name, i) => ({
            label: name, data: allData.chartData[year][name][currentMetric],
            borderColor: COLORS[i % COLORS.length], borderWidth: 2.5, pointRadius: 4, tension: 0.3, fill: false
        }));
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v => getFormatted(v), color: '#aaa', font: { size: 9 } } },
                    x: { ticks: { color: '#aaa', font: { size: 10 } } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
    init();
</script>
</body>
</html>
