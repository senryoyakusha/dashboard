<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Management Dashboard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --gold: #d4af37;
            --text-gray: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px 0;
            background: var(--card-bg);
            border-bottom: 1px solid #333;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--gold);
        }

        .container {
            width: 92%;
            max-width: 500px;
            margin-top: 20px;
        }

        /* スタッフ選択チップ */
        .staff-selector {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 5px 0 20px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .staff-selector::-webkit-scrollbar { display: none; }

        .staff-chip {
            white-space: nowrap;
            padding: 8px 20px;
            border-radius: 25px;
            background: var(--card-bg);
            border: 1px solid #333;
            font-size: 0.85rem;
            color: var(--text-gray);
            cursor: pointer;
            transition: 0.2s;
        }
        .staff-chip.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            font-weight: bold;
        }

        /* グラフコンテナ */
        .chart-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            height: 350px;
        }

        #loading {
            margin-top: 100px;
            text-align: center;
            color: var(--gold);
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            z-index: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">SALES TREND 2026</div>
</header>

<div id="loading">
    <i class="fas fa-spinner fa-spin fa-2x"></i>
    <p>Loading Data...</p>
</div>

<div class="container" id="main-content" style="display: none;">
    <div class="staff-selector" id="staff-selector">
        <div class="staff-chip active" onclick="updateView('店舗全体', this)">店舗全体</div>
    </div>

    <div class="chart-card">
        <canvas id="salesChart"></canvas>
    </div>
</div>

<div class="refresh-btn" onclick="fetchData()">
    <i class="fas fa-sync-alt" style="color: #000; font-size: 1.4rem;"></i>
</div>

<script>
    // あなたのGAS URL
    const GAS_URL = "https://script.google.com/a/macros/senryoyakusha.com/s/AKfycbxAzSojBu5Tjzjge2akg4d_VKGdl6ZCYoEjaRRKiZaRI5DXfFEdkH8MKwW2eI2UgCc/exec";
    const userId = "user_gps3atgzq"; // PCテスト用

    let allData = null;
    let myChart = null;

    /**
     * 初回データ取得
     */
    async function fetchData() {
        try {
            const res = await fetch(`${GAS_URL}?userId=${userId}`);
            allData = await res.json();
            
            if (allData.status === 'success') {
                renderSelector(allData.staffList);
                renderChart("店舗全体");
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        } catch (e) {
            document.getElementById('loading').innerText = "通信エラーが発生しました";
        }
    }

    /**
     * スタッフボタンの生成
     */
    function renderSelector(list) {
        const container = document.getElementById('staff-selector');
        // 二重生成防止
        container.innerHTML = '<div class="staff-chip active" onclick="updateView(\'店舗全体\', this)">店舗全体</div>';
        
        list.forEach(name => {
            const chip = document.createElement('div');
            chip.className = 'staff-chip';
            chip.innerText = name;
            chip.onclick = () => updateView(name, chip);
            container.appendChild(chip);
        });
    }

    /**
     * 折れ線グラフの描画
     */
    function renderChart(targetName) {
        const ctx = document.getElementById('salesChart').getContext('2d');
        const labels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: targetName,
                    data: allData.chartData[targetName],
                    borderColor: '#d4af37',
                    backgroundColor: 'rgba(212, 175, 55, 0.1)',
                    borderWidth: 3,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#d4af37',
                    pointRadius: 4,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#aaa', font: { size: 10 } }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#aaa', font: { size: 10 } }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(30, 30, 30, 0.9)',
                        callbacks: {
                            label: function(context) {
                                return context.parsed.y.toLocaleString() + '円';
                            }
                        }
                    }
                }
            }
        });
    }

    /**
     * 切り替え処理
     */
    function updateView(name, el) {
        document.querySelectorAll('.staff-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        renderChart(name);
    }

    window.onload = fetchData;
</script>
</body>
</html>
