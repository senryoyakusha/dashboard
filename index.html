<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Management Dashboard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --gold: #d4af37; --white: #ffffff; --gray: #2a2a2a; --blue: #3498db; }
        body { font-family: sans-serif; background: var(--bg); color: var(--white); margin: 0; overflow: hidden; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #333; text-align: center; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
        .container { width: 94%; max-width: 500px; margin: 10px auto; padding-bottom: 80px; }
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { height: 100%; overflow-y: auto; }
        .year-selector { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .year-btn { padding: 6px 15px; border-radius: 20px; background: var(--gray); border: 1px solid #444; color: #aaa; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        .year-btn.active { background: #444; color: var(--gold); border-color: var(--gold); }
        .metric-selector { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 12px; scrollbar-width: none; }
        .metric-btn { white-space: nowrap; padding: 10px 18px; border-radius: 10px; background: var(--gray); border: 1px solid #444; color: #aaa; font-size: 0.8rem; cursor: pointer; }
        .metric-btn.active { background: var(--gold); color: #000; font-weight: bold; }
        .select-box { background: var(--card); border: 1px solid #444; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.85rem; margin-bottom: 10px; }
        .dropdown { display: none; background: var(--card); border: 1px solid #444; border-radius: 10px; padding: 5px; max-height: 400px; overflow-y: auto; position: absolute; width: 90%; max-width: 470px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .store-header { background: rgba(212, 175, 55, 0.1); padding: 10px; color: var(--gold); font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
        .staff-option { padding: 12px 10px 12px 40px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .chart-card { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid rgba(212, 175, 55, 0.2); height: 320px; margin-top: 10px; }
        .stat-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #333; margin-top: 10px; padding-top: 10px;}
        .triple-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; border-top: 1px solid #333; margin-top: 10px; padding-top: 10px;}
        .data-label { font-size: 0.6rem; color: #aaa; margin-bottom: 2px; }
        .data-value { font-size: 1.1rem; color: var(--gold); font-weight: bold; }
        .data-value.sub { color: #eee; font-size: 0.95rem; }
        #loading { text-align: center; margin-top: 80px; color: var(--gold); position: absolute; width: 100%; z-index: 9999; }
        input[type="checkbox"] { transform: scale(1.3); accent-color: var(--gold); }
    </style>
</head>
<body>

<div id="loading"><i class="fas fa-circle-notch fa-spin fa-2x"></i><p>Loading...</p></div>

<div class="swiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide"><header>SALES PERFORMANCE</header><div class="container" id="page-1-content"></div></div>
        <div class="swiper-slide"><header>COST ANALYSIS</header><div class="container" id="page-2-content"></div></div>
        <div class="swiper-slide"><header>STORE ANALYSIS</header><div class="container" id="page-3-content"></div></div>

        <div class="swiper-slide">
            <header>COMPANY DASHBOARD</header>
            <div class="container">
                <div class="year-selector" id="year-selector-4"></div>
                <div class="metric-selector">
                    <button class="metric-btn active" onclick="changeComMetric('totalSales', this)">売上</button>
                    <button class="metric-btn" onclick="changeComMetric('storeProfit', this)">店舗営業利益</button>
                    <button class="metric-btn" onclick="changeComMetric('companyProfit', this)">社内全体利益</button>
                    <button class="metric-btn" onclick="changeComMetric('fcf', this)">FCF</button>
                    <button class="metric-btn" onclick="changeComMetric('balance', this)">口座残高</button>
                    <button class="metric-btn" onclick="changeComMetric('expense', this)">経費残額</button>
                </div>
                <div class="chart-card"><canvas id="comChart"></canvas></div>
                <div class="stats-container"><div class="stats-title" id="com-title">経営実績</div><div id="com-cards-list"></div></div>
            </div>
        </div>
    </div>
    <div class="swiper-pagination"></div>
</div>

<script>
    const GAS_URL = "https://script.google.com/a/macros/senryoyakusha.com/s/AKfycbxAzSojBu5Tjzjge2akg4d_VKGdl6ZCYoEjaRRKiZaRI5DXfFEdkH8MKwW2eI2UgCc/exec";
    const currentUserId = "user_gps3atgzq"; 
    const BASE_COLORS = ['rgba(212, 175, 55', 'rgba(52, 152, 219', 'rgba(231, 76, 60', 'rgba(46, 204, 113'];

    let allData = null, comChart = null;
    let selectedYears = [], currentComMetric = 'totalSales';
    
    const formats = {
        totalSales: { u: '￥', s: '', d: 0, t: 'totalSalesTarget', r: 'totalSalesRate' },
        storeProfit: { u: '￥', s: '', d: 0, t: 'storeProfitTarget', r: 'storeProfitRate' },
        companyProfit: { u: '￥', s: '', d: 0, t: 'companyProfitTarget', r: 'companyProfitRate' },
        fcf: { u: '￥', s: '', d: 0, t: 'fcfTarget' },
        balance: { u: '￥', s: '', d: 0, t: 'balanceTarget' },
        expense: { u: '￥', s: '', d: 0 },
        // ... (以前の指標フォーマットも維持)
    };

    const swiper = new Swiper('.swiper', { pagination: { el: '.swiper-pagination' } });

    async function init() {
        const res = await fetch(`${GAS_URL}?userId=${currentUserId}`);
        allData = await res.json();
        if (allData.status === 'success') {
            selectedYears = [allData.yearList[0]];
            renderYearSelectors();
            updateComDisplay();
            // (1〜3枚目の描画ロジックもここに記述)
            document.getElementById('loading').style.display = 'none';
        }
    }

    function getFormatted(val, metric) {
        const f = formats[metric] || { u: '', s: '', d: 0 };
        let dVal = Number(val); if (f.s === '％') dVal *= 100;
        return f.u + dVal.toLocaleString(undefined, {minimumFractionDigits: f.d, maximumFractionDigits: f.d}) + f.s;
    }

    function changeComMetric(m, btn) {
        document.querySelectorAll('#year-selector-4 + .metric-selector .metric-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); currentComMetric = m; updateComDisplay();
    }

    function updateComDisplay() { updateComChart(); updateComCards(); }

    function updateComCards() {
        const list = document.getElementById('com-cards-list'); const year = selectedYears[0]; const month = new Date().getMonth();
        const f = formats[currentComMetric];
        const data = allData.companyData[year];
        let html = "";

        if (currentComMetric === 'expense') {
            html = `<div class="stat-card"><span class="stat-name">経費残額</span><div class="triple-grid">
                <div class="data-item"><span class="data-label">中園B</span><span class="data-value" style="font-size:0.9rem">${getFormatted(data.nakazonoB[month],'expense')}</span></div>
                <div class="data-item"><span class="data-label">椹木B</span><span class="data-value" style="font-size:0.9rem">${getFormatted(data.sawaragiB[month],'expense')}</span></div>
                <div class="data-item"><span class="data-label">江川B</span><span class="data-value" style="font-size:0.9rem">${getFormatted(data.egawaB[month],'expense')}</span></div>
            </div></div>`;
        } else {
            const val = data[currentComMetric][month];
            const target = f.t ? data[f.t][month] : 0;
            const rate = f.r ? data[f.r][month] : null;
            html = `<div class="stat-card"><div style="display:flex;justify-content:space-between"><span>実績数値</span>${rate ? `<span style="color:var(--gold)">達成率: ${(rate*100).toFixed(1)}%</span>` : ''}</div>
                <div class="comparison-grid">
                    <div class="data-item"><span class="data-label">目標</span><span class="data-value sub">${getFormatted(target,currentComMetric)}</span></div>
                    <div class="data-item"><span class="data-label">実績</span><span class="data-value">${getFormatted(val,currentComMetric)}</span></div>
                </div></div>`;
        }
        list.innerHTML = html;
    }

    function updateComChart() {
        const ctx = document.getElementById('comChart').getContext('2d'); if (comChart) comChart.destroy();
        const datasets = []; const year = selectedYears[0];
        const f = formats[currentComMetric];
        const data = allData.companyData[year];

        if (currentComMetric === 'expense') {
            // 経費は3人分出す
            [['nakazonoB','中園B','#d4af37'],['sawaragiB','椹木B','#3498db'],['egawaB','江川B','#e74c3c']].forEach(p => {
                datasets.push({ label: p[1], data: data[p[0]], borderColor: p[2], borderWidth: 2, pointRadius: 3, tension: 0.3, fill: false });
            });
        } else {
            // 実績ライン
            datasets.push({ label: '実績', data: data[currentComMetric], borderColor: 'rgba(212,175,55,1)', borderWidth: 3, pointRadius: 4, pointHitRadius: 30, tension: 0.3, fill: false });
            // 目標ライン (点線)
            if (f.t) {
                datasets.push({ label: '目標', data: data[f.t], borderColor: 'rgba(255,255,255,0.3)', borderWidth: 2, borderDash: [5,5], pointRadius: 0, tension: 0.3, fill: false });
            }
        }

        comChart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], datasets },
            options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v => getFormatted(v, currentComMetric), color: '#aaa', font: { size: 9 } } } }, plugins: { legend: { display: true, labels: { color: '#fff', font: { size: 9 } } } } }
        });
    }

    init();
</script>
</body>
</html>
