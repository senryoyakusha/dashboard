<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Management Dashboard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --gold: #d4af37;
            --text-gray: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding-bottom: 30px;
        }

        header {
            padding: 20px;
            background: var(--card-bg);
            border-bottom: 1px solid #333;
            text-align: center;
            color: var(--gold);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .container {
            width: 92%;
            max-width: 500px;
            margin: 20px auto;
        }

        /* スタッフ選択エリア */
        .selection-area {
            margin-bottom: 20px;
        }

        .select-trigger {
            background: var(--card-bg);
            border: 1px solid var(--gold);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }

        .dropdown-menu {
            display: none;
            background: var(--card-bg);
            border: 1px solid #444;
            border-radius: 12px;
            margin-top: 5px;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
        }

        .staff-option {
            padding: 12px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .staff-option input[type="checkbox"] {
            transform: scale(1.5);
            accent-color: var(--gold);
        }

        /* グラフエリア */
        .chart-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            height: 400px;
        }

        #loading { text-align: center; margin-top: 50px; color: var(--gold); }
    </style>
</head>
<body>

<header>SALES TREND 2026</header>

<div id="loading"><i class="fas fa-spinner fa-spin fa-2x"></i></div>

<div class="container" id="main-content" style="display: none;">
    
    <div class="selection-area">
        <div class="select-trigger" onclick="toggleDropdown()">
            <span id="selected-staff-label">表示スタッフを選択</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        <div id="staff-dropdown" class="dropdown-menu">
            </div>
    </div>

    <div class="chart-card">
        <canvas id="salesChart"></canvas>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/a/macros/senryoyakusha.com/s/AKfycbxAzSojBu5Tjzjge2akg4d_VKGdl6ZCYoEjaRRKiZaRI5DXfFEdkH8MKwW2eI2UgCc/exec";
    const userId = "user_gps3atgzq"; // PCテスト用

    let allData = null;
    let myChart = null;
    let selectedStaffs = [];

    async function fetchData() {
        try {
            const res = await fetch(`${GAS_URL}?userId=${userId}`);
            allData = await res.json();
            
            if (allData.status === 'success') {
                // デフォルト選択（自分の名前を探すロジックはGAS側から渡されたユーザー情報で行う）
                // ここでは仮に最初のスタッフを選択
                selectedStaffs = ["店舗全体"];
                renderDropdown(allData.staffList);
                renderChart();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        } catch (e) { console.error(e); }
    }

    function toggleDropdown() {
        const menu = document.getElementById('staff-dropdown');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    function renderDropdown(list) {
        const menu = document.getElementById('staff-dropdown');
        const items = ["店舗全体", ...list];
        
        menu.innerHTML = items.map(name => `
            <div class="staff-option">
                <input type="checkbox" id="chk-${name}" value="${name}" 
                    ${selectedStaffs.includes(name) ? 'checked' : ''} 
                    onchange="handleSelectionChange()">
                <label for="chk-${name}">${name}</label>
            </div>
        `).join('');
    }

    function handleSelectionChange() {
        const checkboxes = document.querySelectorAll('.staff-option input:checked');
        selectedStaffs = Array.from(checkboxes).map(cb => cb.value);
        document.getElementById('selected-staff-label').innerText = 
            selectedStaffs.length > 0 ? selectedStaffs.join(', ') : '選択してください';
        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        const labels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        
        if (myChart) myChart.destroy();

        const datasets = selectedStaffs.map((name, index) => ({
            label: name,
            data: allData.chartData[name],
            borderColor: index === 0 ? '#d4af37' : `hsl(${index * 40}, 70%, 60%)`, // 2人目以降は色を変える
            backgroundColor: 'transparent',
            borderWidth: 3,
            pointRadius: 6,
            pointHitRadius: 25, // ★タップの反応範囲を大幅拡大
            tension: 0.3
        }));

        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false, // ★点の真上じゃなくても反応させる
                },
                scales: {
                    y: { beginAtZero: true, grid: { color: '#333' } },
                    x: { grid: { display: false } }
                },
                plugins: {
                    legend: { labels: { color: '#fff' } }
                }
            }
        });
    }

    window.onload = fetchData;
</script>
</body>
</html>
