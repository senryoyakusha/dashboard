<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Management Dashboard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --gold: #d4af37; --text: #a0a0a0; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 30px; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #333; text-align: center; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
        .container { width: 94%; max-width: 500px; margin: 15px auto; }

        .select-label { font-size: 0.75rem; color: var(--gold); margin-bottom: 5px; margin-left: 5px; font-weight: bold; text-transform: uppercase; }
        .select-box { background: var(--card); border: 1px solid var(--gold); padding: 12px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.9rem; }
        
        .dropdown { display: none; background: var(--card); border: 1px solid #444; border-radius: 10px; padding: 5px; margin-bottom: 15px; max-height: 300px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .option { padding: 12px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
        .option:last-child { border-bottom: none; }
        .option input { transform: scale(1.3); accent-color: var(--gold); }
        .option label { flex-grow: 1; cursor: pointer; }

        .chart-card { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid rgba(212, 175, 55, 0.2); height: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #loading { text-align: center; margin-top: 80px; color: var(--gold); }
    </style>
</head>
<body>

<header>DASHBOARD 2026</header>

<div id="loading"><i class="fas fa-circle-notch fa-spin fa-2x"></i><p>Authenticating...</p></div>

<div class="container" id="main-content" style="display: none;">
    
    <div class="select-label">Filter (Stores & Staffs)</div>
    <div class="select-box" onclick="toggleDisplay('filter-dropdown')">
        <span id="filter-label">表示対象を選択</span><i class="fas fa-filter"></i>
    </div>
    <div id="filter-dropdown" class="dropdown">
        </div>

    <div class="chart-card">
        <canvas id="salesChart"></canvas>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/a/macros/senryoyakusha.com/s/AKfycbxAzSojBu5Tjzjge2akg4d_VKGdl6ZCYoEjaRRKiZaRI5DXfFEdkH8MKwW2eI2UgCc/exec";
    // PCテスト用ID。本番はシフトアプリのlocalStorageから取得
    const currentUserId = "user_gps3atgzq"; 

    const COLORS = ['#d4af37','#3498db','#e74c3c','#2ecc71','#9b59b6','#f1c40f','#1abc9c','#e67e22','#ecf0f1','#ff69b4'];

    let allData = null;
    let myChart = null;
    let selectedKeys = []; // 選択されている店舗名またはスタッフ名

    async function init() {
        try {
            const res = await fetch(`${GAS_URL}?userId=${currentUserId}`);
            allData = await res.json();
            
            if (allData.status === 'success') {
                // 自分の名前をデフォルト選択に設定
                // GAS側で staffList に {name, store, userId} を含める前提
                const me = allData.staffList.find(s => s.userId === currentUserId);
                if (me) {
                    selectedKeys = [me.name];
                } else {
                    selectedKeys = ["店舗全体"]; // 見つからない場合のフォールバック
                }

                renderDropdown();
                updateChart();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        } catch (e) { console.error(e); }
    }

    function toggleDisplay(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function renderDropdown() {
        const container = document.getElementById('filter-dropdown');
        let html = '<div style="padding:10px; color:#d4af37; font-size:0.7rem; border-bottom:1px solid #333;">STORES</div>';
        
        // 店舗リスト
        allData.storeList.forEach(name => {
            html += `
                <div class="option">
                    <input type="checkbox" id="key-${name}" value="${name}" ${selectedKeys.includes(name) ? 'checked' : ''} onchange="handleSelection()">
                    <label for="key-${name}">${name} (全体)</label>
                </div>`;
        });

        html += '<div style="padding:10px; color:#d4af37; font-size:0.7rem; border-bottom:1px solid #333; margin-top:10px;">STAFFS</div>';

        // スタッフリスト
        allData.staffList.forEach(s => {
            html += `
                <div class="option">
                    <input type="checkbox" id="key-${s.name}" value="${s.name}" ${selectedKeys.includes(s.name) ? 'checked' : ''} onchange="handleSelection()">
                    <label for="key-${s.name}">${s.name}</label>
                </div>`;
        });

        container.innerHTML = html;
        updateLabel();
    }

    function handleSelection() {
        const chks = document.querySelectorAll('#filter-dropdown input:checked');
        selectedKeys = Array.from(chks).map(c => c.value);
        updateLabel();
        updateChart();
    }

    function updateLabel() {
        const label = document.getElementById('filter-label');
        if (selectedKeys.length === 0) label.innerText = "選択してください";
        else if (selectedKeys.length === 1) label.innerText = selectedKeys[0];
        else label.innerText = `${selectedKeys.length}項目を表示中`;
    }

    function updateChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (myChart) myChart.destroy();

        const datasets = selectedKeys.map((key, i) => ({
            label: key,
            data: allData.chartData[key],
            borderColor: COLORS[i % COLORS.length],
            borderWidth: 2.5,
            pointRadius: 5,
            pointHitRadius: 30, // タップしやすさ向上
            tension: 0.3,
            fill: false
        }));

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#aaa', font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { color: '#aaa', font: { size: 10 } } }
                },
                plugins: { 
                    legend: { position: 'bottom', labels: { color: '#fff', boxWidth: 10, font: { size: 10 } } }
                }
            }
        });
    }

    init();
</script>
</body>
</html>
