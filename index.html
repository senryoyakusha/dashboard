<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Dashboard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --gold: #d4af37; --white: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--white); margin: 0; padding-bottom: 30px; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #333; text-align: center; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
        .container { width: 94%; max-width: 500px; margin: 10px auto; }
        .metric-selector { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; scrollbar-width: none; }
        .metric-selector::-webkit-scrollbar { display: none; }
        .metric-btn { white-space: nowrap; padding: 8px 15px; border-radius: 8px; background: #2a2a2a; border: 1px solid #444; color: #aaa; font-size: 0.75rem; cursor: pointer; }
        .metric-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }
        .select-box { background: var(--card); border: 1px solid #444; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 10px; font-size: 0.85rem; }
        .dropdown { display: none; background: var(--card); border: 1px solid #444; border-radius: 10px; padding: 5px; max-height: 350px; overflow-y: auto; position: absolute; width: 90%; max-width: 470px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .store-header { background: rgba(212, 175, 55, 0.1); padding: 10px; color: var(--gold); font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; gap: 10px; }
        .staff-option { padding: 10px 10px 10px 40px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .chart-card { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid rgba(212, 175, 55, 0.2); height: 380px; margin-top: 10px; }
        #loading { text-align: center; margin-top: 80px; color: var(--gold); }
        input[type="checkbox"] { transform: scale(1.2); accent-color: var(--gold); }
    </style>
</head>
<body>

<header>MANAGEMENT DASHBOARD</header>

<div id="loading"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>

<div class="container" id="main-content" style="display: none;">
    <div class="metric-selector" id="metric-selector">
        <button class="metric-btn active" onclick="changeMetric('sales', this)">総売上</button>
        <button class="metric-btn" onclick="changeMetric('shimeiSales', this)">指名売上</button>
        <button class="metric-btn" onclick="changeMetric('timePrice', this)">時間単価</button>
        <button class="metric-btn" onclick="changeMetric('shimeiCount', this)">指名客数</button>
        <button class="metric-btn" onclick="changeMetric('newCount', this)">新規客数</button>
        <button class="metric-btn" onclick="changeMetric('nextReserve', this)">次回予約率</button>
        <button class="metric-btn" onclick="changeMetric('newRepeat', this)">新規再来率</button>
    </div>

    <div class="select-box" onclick="toggleDropdown()">
        <span id="filter-label">読み込み中...</span><i class="fas fa-users"></i>
    </div>
    <div id="filter-dropdown" class="dropdown"></div>

    <div class="chart-card">
        <canvas id="salesChart"></canvas>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/a/macros/senryoyakusha.com/s/AKfycbxAzSojBu5Tjzjge2akg4d_VKGdl6ZCYoEjaRRKiZaRI5DXfFEdkH8MKwW2eI2UgCc/exec";
    const currentUserId = "user_gps3atgzq"; 

    const COLORS = ['#d4af37','#3498db','#e74c3c','#2ecc71','#9b59b6','#f1c40f','#1abc9c','#e67e22','#ecf0f1','#ff69b4'];

    let allData = null;
    let myChart = null;
    let selectedKeys = []; 
    let currentMetric = 'sales';

    // 指標ごとのフォーマットルール
    const formats = {
        sales: { unit: '￥', suffix: '', decimal: 0 },
        shimeiSales: { unit: '￥', suffix: '', decimal: 0 },
        timePrice: { unit: '￥', suffix: '', decimal: 0 },
        shimeiCount: { unit: '', suffix: '名', decimal: 0 },
        newCount: { unit: '', suffix: '名', decimal: 0 },
        nextReserve: { unit: '', suffix: '％', decimal: 2 },
        newRepeat: { unit: '', suffix: '％', decimal: 2 }
    };

    async function init() {
        try {
            const res = await fetch(`${GAS_URL}?userId=${currentUserId}`);
            allData = await res.json();
            if (allData.status === 'success') {
                const myName = allData.myInfo.userName;
                const myStore = allData.staffList.find(s => s.name === myName)?.store;
                selectedKeys = allData.staffList.filter(s => s.store === myStore).map(s => s.name);
                renderDropdown(myStore);
                updateChart();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        } catch (e) { console.error(e); }
    }

    function toggleDropdown() {
        const el = document.getElementById('filter-dropdown');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function renderDropdown(myStore) {
        const container = document.getElementById('filter-dropdown');
        const sortedStores = [...allData.storeList].sort((a, b) => (a === myStore ? -1 : b === myStore ? 1 : 0));
        let html = "";
        sortedStores.forEach(storeName => {
            const staffs = allData.staffList.filter(s => s.store === storeName);
            html += `<div class="store-header"><input type="checkbox" onchange="toggleStore('${storeName}', this)"><label>${storeName}</label></div>`;
            staffs.forEach(s => {
                html += `<div class="staff-option"><input type="checkbox" class="staff-chk" data-store="${storeName}" value="${s.name}" ${selectedKeys.includes(s.name) ? 'checked' : ''} onchange="handleStaffChange()"><label>${s.name}</label></div>`;
            });
        });
        container.innerHTML = html;
        updateLabel();
    }

    function toggleStore(storeName, el) {
        document.querySelectorAll(`.staff-chk[data-store="${storeName}"]`).forEach(c => c.checked = el.checked);
        handleStaffChange();
    }

    function handleStaffChange() {
        selectedKeys = Array.from(document.querySelectorAll('.staff-chk:checked')).map(c => c.value);
        updateLabel();
        updateChart();
    }

    function updateLabel() {
        document.getElementById('filter-label').innerText = selectedKeys.length + "名のデータを表示中";
    }

    function changeMetric(metric, btn) {
        document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMetric = metric;
        updateChart();
    }

    function formatVal(val) {
        const f = formats[currentMetric];
        // ％表記の場合は値を100倍して表示（スプシが0.85なら85.00とする場合）
        // スプシですでに整数（85）ならそのままでOK。今回はスプシの値をそのまま整形。
        let displayVal = val.toFixed(f.decimal);
        return f.unit + displayVal.toLocaleString() + f.suffix;
    }

    function updateChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (myChart) myChart.destroy();

        const datasets = selectedKeys.map((name, i) => ({
            label: name,
            data: allData.chartData[name][currentMetric],
            borderColor: COLORS[i % COLORS.length],
            borderWidth: 2,
            pointRadius: 4,
            pointHitRadius: 30,
            tension: 0.3,
            fill: false
        }));

        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { 
                            color: '#aaa', font: { size: 9 },
                            callback: function(value) { return formatVal(value); } // Y軸の目盛り
                        } 
                    },
                    x: { ticks: { color: '#aaa', font: { size: 10 } } }
                },
                plugins: { 
                    legend: { position: 'bottom', labels: { color: '#fff', boxWidth: 8, font: { size: 9 } } },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + formatVal(context.parsed.y);
                            }
                        }
                    }
                }
            }
        });
    }

    init();
</script>
</body>
</html>
